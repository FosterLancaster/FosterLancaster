<html lang="en">
<head>

<title>FOSTMp3's version 2.0</title>
<!----Style Sheets---->

<!----Fost Mp3's----
<iframe src="https://fostmp3s.com/fostmp3s.html" style="min-height: 300px; min-width: 200px; max-height: 90dvh; display: block; border: none;" class="fostmp3s" loading="lazy" allow="autoplay; fullscreen">

<style>
a {
  text-decoration: none;
}
button {
  outline: none;
}
body {
  font-family: 'futura';
}
/* Hide default audio controls */
.fostmp3s {
  display: block;
}
audio {
  display: none;
}
.audio-player-container img.default-image {
  display: block;
}
.audio-player-container img.playing {
  display: none;
}
#PayOff {
  display: none;
 }
 #PayOn {
  display: block;
 }
td {
  padding: 0;
}
table {
  border-spacing: 0;
}
 .LancasterFrame {
  font-size: 18px;
  width: 100%;
  height: 100%;
  overflow: hidden;
  position: relative;
  opacity: .7;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  background-color: transparent;
  background-position: center center;
  background-size: cover;
  background-image: linear-gradient(to top right, rgb(255, 255, 255, .8), transparent, rgb(255, 255, 255, .8));
}
.LancasterFrame:hover {
  opacity: 1;
}
.LancasterFrame:hover .LancasterMusicPlayer{
  background-image: none;
  opacity: .9;
}
.LancasterFrame:hover .songSelection {
  opacity: 1;
  pointer-events: all;
}
.LancasterFrame:hover .ControlBar {
  height: 40px;
}
.LancasterFrame:hover .PasswordBar {
  height: 40px;
  opacity: 1;
}
.LancasterFrame:hover .MusicHeader {
  padding: 0px;
}
#playBtn:hover .listenCounter {
  opacity: 1;
}
 .MusicHeader {
  transition-duration: .2s;
  padding: 40px 0px 40px 0px;
  position: relative;
  text-align: left;
  max-height: 250px;
  overflow: hidden;
}
 .LancasterMusicPlayer {
  width: 100%;
  height: 100%; /* Important */
  text-align: center;
  color: #d3d3d3;
  background-image: url('fmp3simages/FostMp3sLogo.png');
  background-size: 180px auto;
  background-position: center bottom;
  background-repeat: no-repeat;
  position: relative;
  overflow: hidden;
}
/*----Bars----*/
.Password {
  font-size: 19px;
  font-family: 'Futura';
  line-height: 40px;
  height: 40px;
  padding: 0 10px;
  box-sizing: border-box;
  margin: 0px;
  text-indent: 5px;
  width: 100%;
  max-width: 100%;
  -webkit-appearance: none;
  color: #ffffff;
  appearance: none;
  flex-grow: 1; /* if in a flex container */
  min-width: 0; /* prevent overflow in flex */
  overflow: hidden;
  background-color: transparent;
  border: none;
  animation: clickhere 2s linear infinite;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  font-size: 19px;
  font-family: 'futura';
  height: 40px;
  margin: 0px;
  width: auto;
  padding: 0px 4vw 0px 4vw;
  color: #ffff00;
  text-align: center;
  cursor: pointer;
  user-select: none; /* prevent highlighting text */
  pointer-events: auto;
  background-color: transparent;
  border-left: solid .5px rgb(255, 255, 255, .7);
}
.PasswordSubmit:hover {
  color: rgb(0, 0, 0, .7);
  background-color: rgb(255, 255, 255, .7);
}
.PasswordBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  opacity: 0;
  transition-duration: .2s;
  width: auto;
  color: #000000;
  display: flex;
  align-items: center;
  justify-content: center;
  width: calc(100% - 10px);
  overflow: hidden;
  border-radius: 90px;
  background-position: center center;
  background-size: 200px auto;
  background-attachment: scroll;
  background-repeat: no-repeat;
  border: solid 5px #ffffff;
  background-color: rgb(255, 255, 0, .2);
  background-image: url('fmp3simages/FostMp3sLogoImprint.png');
}
/* PasswordUnlockBar */
.PasswordUnlockBar {
  position: relative;
  width: 100%;
  left: 0px;
  overflow: hidden;
  margin: 0px;
  background-color: transparent;
}
.EngageBar {
  height: 90px;
  display: block;
  overflow: hidden;
}
.EngageBar table {
  height: 90px;
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;        /* 🔑 forces equal-width cells */
}
.EngageBar td {                 /* each td = half */
  text-align: center;
  vertical-align: middle;     /* vertical center for table */
  padding: 0;
  outline: none;
  box-shadow: none;
}
/* Center content inside each td */
.EngageBar td > * {
  justify-content: center;
  align-items: center;
  display: flex;
  height: 100%;
  width: calc(100% - 0px);
}
.EngageBar td:focus,
.EngageBar td:active {
  outline: none;
  box-shadow: none;
}
.EngageBar td:hover {
  background-color: rgb(255, 255, 0, .5);
}

.ControlBar {
  max-height: 40px;
  line-height: 40px;
  height: 0px;
  transition: height .2s ease;
  overflow: hidden;
  display: flex;
  align-items: center;       /* vertical centering */
  border-bottom-right-radius: 20px;
  border: none;
  justify-content: right;
  border-top: none;
}

/*------100vh Controls Sum Landscape = (218px - 202px (16px))-------*/
/*----Bars----*/
.songSelection {
  /*----Music----*/
  height: calc(100vh - 218px);
  min-height: calc(100vh - 218px);
  padding: 5px;
  margin: 4px;
  border-radius: 0px;
  position: relative;
  border: solid .5px #ffff00;
  width: calc(100% - 20px);
  overflow-y: scroll;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  opacity: .1;
  transition-duration: .2s;
  pointer-events: none;
  display: block;
}
.OffMusicHeader {
  height: calc((100vh - 202px) / 4);
  min-height: calc((100vh - 202px) / 4);
  width: 100%;
  display: flex; 
  align-items: center; 
  justify-content: center; 
  color: #ffffff;
  font-size: 1em;
  max-width: 95%;
  overflow: hidden;
}
 .BuyButton {
  height: calc((100vh - 202px) / 4);
  min-height: calc((100vh - 202px) / 4);
  font-family: "FL";
  position: relative;
  width: calc(100% - 1px);
  display: flex;
  align-items: center;
  justify-content: center;
  border: .5px solid #ffffff;
  background-color: rgba(255, 255, 255, 0.5);
  color: #ffffff;
  border-radius: 0px;
  overflow: hidden;
 }
 .BuyButton:hover {
  filter: brightness(1.5);
 }
.song-button {
  font-family: 'futura';
  font-size: 16px;
  color: #ffff00;
  position: relative;
  width: calc(100% - 10px);
  overflow: hidden;
  height: 38px;
  line-height: 38px;
  margin: 1px 5px 1px 5px;
  border: solid .5px #ffff00;
  background-color: transparent;
  background-image: linear-gradient(to top, rgba(0, 0, 0, .3), transparent, transparent);
  background-size: cover;
  text-align: left;
  padding-left: 44px;
  border-top-left-radius: 20px;
  border-bottom-right-radius: 20px;
  opacity: .8;
  transition-duration: .5s;
  cursor: pointer;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.song-button:hover {
  background-color: rgb(255, 255, 0, .5);
  width: 100%;
  margin: 1px 0px 1px 0px;
}
.song-button:focus {
  background-color: rgb(255, 255, 0, .5);
  height: 100px;
  padding-left: 106px;
}
.AlbumThumbnail {
  height: 100%; /* Fill the height of the button */
  width: auto; /* Maintain the aspect ratio */
  margin: 0px;
  padding: 0px;
  position: absolute;
  top: 0px;
  left: 0px;
  z-index: 0;
  transition-duration: .5s;
}
.MusicButton {
  height: auto;
  width: auto;
  position: relative;
}
.BuyButtonIcon {
  width: auto;
  height: 1.5em;
  display: block; /* prevents inline spacing */
  object-fit: contain; /* preserves aspect ratio */
  margin: .5em;
}
.PwkeyIcon {
  height: 3em;
  width: auto;
}
.audio-player {
  width: 100%;
  background-color: transparent;
  border: none;
}
.messageBtn {
  cursor: pointer;
  margin-bottom: -13px;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
}
.shuffleBtn {
  cursor: pointer;
  margin-bottom: -13px;
  border: inline-block;
  cursor: pointer;
  height: 40px;
  width: auto;
}
.messageBtn:hover {
  background-color: rgba(255, 255, 0, .5);
}
.shuffleBtn:hover {
  background-color: rgba(255, 255, 0, .5);
}
.nextprev-btn {
  cursor: pointer;
  margin-bottom: -13px;
  width: 40px;
  height: 40px;
}
.nextprev-btn:hover {
  background-color: rgba(255, 255, 0, .5);
}
.Complete {
  animation: clickhere2 1s linear infinite;
}
#playBtn {
  cursor: pointer;
  box-shadow: none;
  border: none;
}
#playBtn:focus {
  outline: none;
  box-shadow: none;
}
/* Play button */
#playLogo {
  height: auto;
  width: 90px;
  position: relative;
  z-index: 2;
  cursor: pointer;
  transition-duration: .3s;
  max-width: 80%;
}
#buyBtn {
  cursor: pointer;
  border: none;
}
#buyLogo {
  height: auto;
  width: 90px;
  max-width: 80%;
}
/* Listen counter badge */
.listenCounter {
  color: #ffffff;
  font-family: 'futura';
  position: relative;
  height: 0px;
  width: 100%;
  max-height: 25px;
  line-height: 25px;
  margin-top: -25px;
  top: 0px;
  z-index: 3;                  /* above play button */
  font-size: 12px;
  opacity: 0;
  display: block;
  align-items: center;
  justify-content: center;
  pointer-events: none;        /* clicks pass through */
  background-color: rgba(0, 0, 0, .5);
  transition-duration: .8s;
  overflow: hidden;
}
/*----Bars----*/
.SongProgressBar {
  position: relative;
  bottom: 0px;
  height: 40px;
}
/*---- Volume ----*/
.volumeBtn {
  line-height: 40px;
  border: inline-block;
  height: 40px;
  width: auto;
}
#volumeControl {
  position: relative;
  display: block;
  height: 20px;
  margin: 0;
  padding: 0;
  width: 100%;
  box-sizing: border-box;
}
.volumeContainer {
  height: 40px;
  width: 80px;
  display: block;
  padding: 0px 5px 0px 5px;
}
.volumeContainer:hover {
  background-color: rgba(255, 255, 0, .5);
}
.progressBar {
  width: 60px;
  height: 10px;
  max-width: 100%;
  background-color: transparent;
  border-radius: 90px;
  border: solid 1.5px #ffff00;
  cursor: pointer;
  overflow: hidden;
  margin: 0px 5px 0px 5px;
}
.progressBar span {
  display: block;
  height: 100%;
  background-color: #ffff00;
  width: 0;
}
.progressBar:hover {
  background-color: rgba(255, 255, 0, .5);
}
input::placeholder {
  opacity: 1;
  color: #ffffff;
}
input:focus {
  animation: none;
  outline: none;
}
input[type=range]::-webkit-slider-runnable-track {
  width: 100%;
  -webkit-appearance: none;
  background: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: solid 1px #000000;
  margin-bottom: 10px;
}
/* Range input styling */
input[type="range"] {
  background-color: transparent;
  -webkit-appearance: none;
  appearance: none;
  height: 5px;
  border-radius: 5px;
  cursor: pointer;
  border: none;
}
input[type=range]::-webkit-slider-runnable-track {
  background-color: #000000;
  width: 100%;
  height: 5px;
  border: solid 1.5px #ffff00;
  border-radius: 5px;
  cursor: pointer;
}
input[type=range] {
  width: 100%;
  margin: 0; /* Prevent extra margin */
  padding: 0;
  overflow: visible;
}
input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 15px;
  height: 15px;
  background: #000000;
  border: solid 1px #ffff00;
  border-radius: 50%;
  cursor: pointer;
  position: relative;
  margin-top: -6px;
}


/*------100vh Controls Sum Portrait = (228px - 212 (added 10px for mobile))-------*/
@media screen and (max-width: 500px) {
.LancasterFrame {
  max-width: 100%;
  width: 100%;
  }  
.Password {
  line-height: 50px;
  height: 50px; 
  font-size: 22px;
  white-space: nowrap;
  text-overflow: ellipsis;
  display: block;
}
.PasswordSubmit {
  height: 50px;
  font-size: 22px;
  width: auto;
}
.PasswordBar {
  max-height: 50px;
  line-height: 50px;
  height: 0px;
}
.LancasterFrame:hover .PasswordBar {
  height: 50px;
}
.MusicHeader {
  transition-duration: .2s;
  padding: 50px 0px 40px 0px;
  max-height: 251px;
  overflow: hidden;
}
/*----Music----*/
.songSelection {
  height: calc(100vh - 228px);
  min-height: calc(100vh - 228px);
  overflow-y: scroll;
}
.OffMusicHeader {
  height: calc((100vh - 212px) / 4);
  min-height: calc((100vh - 212px) / 4);
}
 .BuyButton {
  height: calc((100vh - 212px) / 4);
  min-height: calc((100vh - 212px) / 4);
 }
}

/* ------------ Miniature Adjustments ----------*/
@media screen and (max-width: 350px) {
.song-button {
  height: 30px;
  padding-left: 36px;
  font-size: 15px;
  line-height: 15px;
}
.song-button:hover {
  height: 35px;
  padding-left: 41px;
}
.song-button:focus {
  height: 45px;
  padding-left: 41px;
}
.OffMusicHeader {
  font-size: 15px;
}
.messageBtn {
  display: none;
}
.shuffleBtn {
  display: inline-block;
}
.nextprev-btn {
  display: inline-block;
}
.volumeContainer {
  display: none;
}
.progressBar {
  display: inline-block;
  width: 50px;
  height: 10px;
  max-width: 100%;
}
#playBtn {
  height: 90px;
  line-height: 90px;
}
.ControlBar {
  justify-content: center;
}
}

@supports (-webkit-touch-callout: none) {
  .volumeContainer {
    display: none;
  }
  .song-button:hover {
  background-color: transparent;
  width: calc(100% - 10px);
  margin: 1px 5px 1px 5px;
}
}

@keyframes clickhere {
  0% { opacity: 1; }
  50% { opacity: 0; }
  100% { opacity: 1; }
}
@keyframes clickhere2 {
  0% { transform: scale(1); }
  50% { transform: scale(.8); }
  100% { transform: scale(1);}
}
</style>
</head>

<script>
// Foster Lancaster Music Player
document.addEventListener("DOMContentLoaded", () => {

  // Call ID's
  const volumeControl = document.getElementById('volumeControl');
  const playBtn       = document.getElementById('playBtn');
  const buyBtn        = document.getElementById('buyBtn');
  const playLogo      = document.getElementById('playLogo');
  const audio         = document.getElementById('audio');
  const introAudio    = document.getElementById('introAudio'); // NEW (now used ONLY when you run out of plays)
  const progressBar   = document.getElementById('progressBar');
  const progress      = document.getElementById('progress');
  const counterDiv    = document.getElementById('listenCounter');
  const payOff        = document.getElementById('PayOff');
  const payOn         = document.getElementById('PayOn');
  const nextBtn       = document.getElementById('nextBtn');
  const prevBtn       = document.getElementById('prevBtn');
  const Password      = document.getElementById('passwordInput');

  // Call Classes
  const passwordBar         = document.querySelector('.PasswordBar');
  const defaultImage        = document.querySelector('.default-image');
  const LancasterMusicPlayer= document.querySelector('.LancasterMusicPlayer');

  // Set Order of Songs
  let songButtons = Array.from(document.querySelectorAll('.song-button'));
  const audioPreload = {};

  // ---- Safety guards (a missing element can stop the whole script and make the play button "not work") ----
  if (!audio) console.warn('[FOSTMp3s] Missing #audio element');
  if (!playBtn) console.warn('[FOSTMp3s] Missing #playBtn element');
  if (!playLogo) console.warn('[FOSTMp3s] Missing #playLogo element');

  // Load Songs
  songButtons.forEach((btn) => {
    const song = btn.dataset.song;
    if (!song) return;
    const audioObj = new Audio(song);
    audioObj.preload = 'auto';
    audioPreload[song] = audioObj;
  });

  // Set Password
  const PASSWORD = "SingToMe";
  let currentSongIndex = -1;

  // Hide Volume
  if (/iPhone|iPad|iPod/.test(navigator.userAgent) && volumeControl) {
    volumeControl.style.display = 'none';
  }

  // Set Listen Count
  const MAX_LISTENS = 10;
  const LISTENS_KEY = 'listensLeft';

  // Check If Paid For Infinite
  const isInfiniteListen = () => {
    // Check for infinite and infinite image
    if (localStorage.getItem('infiniteListen') === 'true') return true;
    if (!counterDiv) return false;

    // Create Image Variable
    const img = counterDiv.querySelector('img');
    if (!img) return false;

    // Swap Variable With Image
    return img.src.includes('Infinity.png');
  };

  // Load Listen Count
  let listensLeft = loadLocalListens();
  function loadLocalListens() {
    const v = parseInt(localStorage.getItem(LISTENS_KEY), 10);
    return Number.isFinite(v) ? v : MAX_LISTENS;
  }

  // Save Local Listen Count Variable
  function saveLocalListens() {
    localStorage.setItem(LISTENS_KEY, String(listensLeft));
  }

  // If Not An Image, Gather The Listen Count
  const updateListenUI = () => {
    if (!counterDiv) return;

    if (isInfiniteListen()) {
      counterDiv.innerHTML = '<img src="fmp3simages/Infinity.png" style="width: 1.2em; padding: 10px; margin: -10px;" alt="∞">';
    } else {
      counterDiv.textContent = String(listensLeft);
    }
  };

  // Load Listens from API
  async function fetchListenCountFromServer() {
    try {
      const res = await fetch('/api/listens', { method: 'GET', credentials: 'include' });
      if (!res.ok) throw new Error('Network error');
      const data = await res.json();

      if (typeof data.listensLeft === 'number') {
        listensLeft = data.listensLeft;
        saveLocalListens();
      } else {
        listensLeft = loadLocalListens();
      }

      if (data.infinite) localStorage.setItem('infiniteListen', 'true');
    } catch (e) {
      listensLeft = loadLocalListens();
    }
    updateListenUI();
  }

  async function saveListenCountToServer() {
    saveLocalListens();
    try {
      await fetch('/api/listens', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ listensLeft, infinite: isInfiniteListen() })
      });
    } catch (e) {
      // ignore; local already saved
    }
  }

  updateListenUI();

  // ---- Run-out-of-plays event (intro moved here) ----
  function onRunOutOfPlays() {
    // Change to Payment Screen
    if (payOff) payOff.style.display = 'block';
    if (payOn)  payOn.style.display  = 'none';
    if (playBtn) playBtn.style.display = 'none';

    // Play Intro (AUDIO) when you run out
    if (introAudio) {
      try { introAudio.pause(); } catch {}
      try { introAudio.currentTime = 0; } catch {}
      const p = introAudio.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    }

    // Play Intro Video (if you have it) when you run out
    document.getElementById("TheIntroPlayer")?.play().catch(()=>{});
  }

  // Decrement Listen Count
  const decrementListenCount = () => {
    if (isInfiniteListen()) return true;

    if (listensLeft > 0) {
      listensLeft--;
      updateListenUI();
      saveListenCountToServer();
      return true;
    }

    // If you hit 0, trigger the run-out event (intro moved here)
    onRunOutOfPlays();
    return false;
  };

  // Set Song as Playing
  const playSong = (index) => {
    if (!audio) return;

    // Update if Haven't Updated
    if (!decrementListenCount()) return;

    // Stop intro audio if it was playing (since we’re starting a real song)
    if (introAudio) {
      try { introAudio.pause(); } catch {}
      try { introAudio.currentTime = 0; } catch {}
    }

    // Organize Song Order
    const btn = songButtons[index];
    if (!btn) return;

    const songPath = btn.dataset.song;
    if (!songPath) return;

    const preloadedAudio = audioPreload[songPath];

    if (preloadedAudio) {
      // For All Preloaded Audio
      audio.src = preloadedAudio.src;
    } else {
      audio.src = songPath;
    }

    audio.load();
    audio.currentTime = 0;

    const p = audio.play();
    if (p && typeof p.then === "function") {
      p.then(() => {
        if (playLogo) playLogo.src = 'fmp3simages/PAUSE.png';
        defaultImage && defaultImage.classList.add('playing');
      }).catch(() => {});
    }
  };

  const selectSong = (index) => {
    // Reset Current Song
    if (currentSongIndex !== -1 && songButtons[currentSongIndex]) {
      songButtons[currentSongIndex].style.backgroundColor = '';
    }

    currentSongIndex = index;

    if (songButtons[index]) {
      // Set Current Song
      songButtons[index].style.backgroundColor = 'rgba(255, 255, 0, .5)';
    }
  };

  const togglePlayPause = () => {
    if (!audio) return;

    if (audio.paused) {
      const p = audio.play();
      if (p && typeof p.then === "function") {
        p.then(() => {
          if (playLogo) playLogo.src = 'fmp3simages/PAUSE.png';
          defaultImage && defaultImage.classList.add('playing');
        }).catch(() => {});
      }
    } else {
      audio.pause();
      if (playLogo) playLogo.src = 'fmp3simages/PLAY.png';
      defaultImage && defaultImage.classList.remove('playing');
    }
  };

  const handleSongButtonClick = (index) => {
    // When Clicking A Song
    if (currentSongIndex !== index) {
      selectSong(index);
      // (Common expectation) clicking a different song starts it
      playSong(index);
      return;
    }
    // Same song clicked: toggle play/pause
    togglePlayPause();
  };

  // Event Listeners - compute index at click time so it matches shuffled order
  songButtons.forEach((btn) => {
    // When Any Button Clicked
    btn.addEventListener('click', () => {
      const index = songButtons.indexOf(btn);
      if (index !== -1) {
        // Order Assigned
        handleSongButtonClick(index);
      }
    });
  });

  if (playBtn) {
    playBtn.addEventListener('click', () => {
      // Play First Song  (FIX: it used to select(0) and return without playing)
      if (currentSongIndex === -1) {
        selectSong(0);
        playSong(0);
        return;
      }

      // Playing The Song
      togglePlayPause();
    });

    // Play Song On Touch Screen Devices (prime audio)
    playBtn.addEventListener('touchstart', () => {
      if (!audio) return;
      audio.play().then(() => audio.pause()).catch(() => {});
    }, { once: true });
  }

  // Progress Bar
  if (progressBar) {
    progressBar.addEventListener('click', (e) => {
      if (!audio) return;
      if (!isNaN(audio.duration)) {
        audio.currentTime = (e.offsetX / progressBar.clientWidth) * audio.duration;
      }
    });
  }

  // Time Update
  function updateProgressFor(active) {
    if (!progress) return;
    if (!isNaN(active.duration) && active.duration > 0) {
      progress.style.width = `${(active.currentTime / active.duration) * 100}%`;
    } else {
      progress.style.width = '0%';
    }
  }

  if (audio) {
    audio.addEventListener('timeupdate', () => updateProgressFor(audio));

    // When Song Ends
    audio.addEventListener('ended', () => {
      let nextIndex = currentSongIndex + 1;
      if (nextIndex >= songButtons.length) nextIndex = 0;
      selectSong(nextIndex);
      playSong(nextIndex);
    });
  }

  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      // Next
      let nextIndex = currentSongIndex + 1;
      if (nextIndex >= songButtons.length) nextIndex = 0;
      selectSong(nextIndex);
      playSong(nextIndex);
    });
  }

  if (prevBtn) {
    prevBtn.addEventListener('click', () => {
      // Previous
      let prevIndex = currentSongIndex - 1;
      if (prevIndex < 0) prevIndex = songButtons.length - 1;
      selectSong(prevIndex);
      playSong(prevIndex);
    });
  }

  if (volumeControl) {
    // Volume Listener
    volumeControl.addEventListener('input', e => {
      if (audio) audio.volume = e.target.value;
      if (introAudio) introAudio.volume = e.target.value; // mirror volume on intro
    });
  }

  // Input Password
  const passwordInput = document.getElementById('passwordInput');
  if (passwordInput) {
    // Enter Submit
    passwordInput.addEventListener('keydown', function (event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        submitPassword();
      }
    });
  }

  window.submitPassword = () => {
    if (document.getElementById('passwordInput')?.value === PASSWORD) {
      localStorage.setItem('infiniteListen', 'true');
      listensLeft = MAX_LISTENS; // or 0, doesn't matter since infinite overrides UI
      updateListenUI();

      // Update to Infinite
      saveListenCountToServer();  // let server know this IP is infinite

      // Set to Normal UI
      if (payOff) payOff.style.display = 'none';
      if (payOn)  payOn.style.display  = 'block';
      if (playBtn) playBtn.style.display = 'block';

      // Reset
      if (Password) {
        Password.value = '';                    // clear the text
        Password.placeholder = '✓ Approved';    // new placeholder
      }

      // Red (your note said Red but this is green; leaving your note)
      if (passwordBar) passwordBar.style.backgroundColor = 'rgba(18, 177, 0, .7)';

      // Play First Song (optional)
      selectSong(0);
      playSong(0);

    } else {

      if (Password) {
        Password.value = '';                    // clear the text
        Password.placeholder = '× Incorrect';   // new placeholder
      }

      // Green (your note said Green but this is red; leaving your note)
      if (passwordBar) passwordBar.style.backgroundColor = 'rgba(255, 0, 1, .7)';
    }
  };

  window.shuffle = () => {
    const container = document.getElementById("songSelection");
    if (!container || songButtons.length === 0) return;

    // Order of Songs
    let newOrder = [...songButtons];

    // Set Current Song Apart
    if (currentSongIndex !== -1 && songButtons[currentSongIndex]) {

      // There is a "current" song – keep it at the top
      const currentBtn = songButtons[currentSongIndex];

      // Remove Current Song
      newOrder = newOrder.filter(btn => btn !== currentBtn);

      // Shuffle Songs
      for (let i = newOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newOrder[i], newOrder[j]] = [newOrder[j], newOrder[i]];
      }

      // Put Current Up
      newOrder.unshift(currentBtn);

      // Set New Order
      newOrder.forEach(btn => container.appendChild(btn));
      songButtons = newOrder;
      currentSongIndex = 0; // current song is now at top, but playback state is unchanged

    } else {

      // No current song selected: just shuffle and start the first one
      for (let i = newOrder.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newOrder[i], newOrder[j]] = [newOrder[j], newOrder[i]];
      }

      newOrder.forEach(btn => container.appendChild(btn));
      songButtons = newOrder;

    }
  }
  fetchListenCountFromServer();

    // Launch Shuffle On Load
  if (songButtons.length > 0) {
    window.shuffle();
  }

});
</script>
